---
- name: Make sure some system dependencies are installed
  become: true
  apt:
    state: 'present'
    update_cache: true
    name:
      - curl
      - xz-utils

- name: Check nix is installed
  shell: |
    [[ -d /nix/var/nix/profiles/default/bin ]] && echo good || echo bad
    executable: /bin/bash
  register: nix_present
  changed_when: "'bad' in nix_present.stdout"

- name: Check if nix folder exist
  stat:
    path: /nix/var/nix/profiles/default/bin
  register: nix_installer_exist

- name: Install nix with nix-installer from determinate system when not found
  shell:
    cmd: |
      # export NIX_INSTALLER_NO_MODIFY_PROFILE=1 ; /bin/bash <(curl -L https://nixos.org/nix/install)
      curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | /bin/bash -s -- install linux
    executable: /bin/bash
  when: not nix_installer_exist.stat.exists
  register: nix_install

